<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Course Image Gallery</title>
    <link rel="stylesheet" href="../assets/css/gridgallery.css">
</head>
<body>

    <main class="gallery-container">
        <header class="gallery-header">
            <h1>Product Gallery</h1>
        </header>

        <section class="image-grid">
            <div class="grid-item large">
                <img src="../assets/images/backpack.jpg" alt="backpack">
                <div class="overlay">
                    <h3>Backpack</h3>
                </div>
            </div>

            <div class="grid-item">
                <img src="../assets/images/camp.jpg" alt="camping">
                <div class="overlay">
                    <h3>Camping</h3>
                </div>
            </div>

            <div class="grid-item">
                <img src="../assets/images/cycling.avif" alt="cycling">
                <div class="overlay">
                    <h3>Cycling</h3>
                </div>
            </div>

            <div class="grid-item tall">
                <img src="../assets/images/runshoes.avif" alt="running shoes">
                <div class="overlay">
                    <h3>Running Shoes</h3>
                </div>
            </div>

            <div class="grid-item">
                <img src="../assets/images/weightlift.avif" alt="fitness">
                <div class="overlay">
                    <h3>Fitness</h3>
                </div>
            </div>

            <div class="grid-item wide">
                <img src="../assets/images/yogamat.avif" alt="yogamat">
                <div class="overlay">
                    <h3>Yoga Mat</h3>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
