<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Card</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="bg-white shadow-lg rounded-lg p-5 max-w-sm">
        
        <!-- Image -->
        <img 
            src="../assets/images/laptop.jpg"
            alt="Card Image"
            class="w-full h-48 object-cover rounded-lg"
        >
        

        <!-- Title --> 
        <h2 class="text-2xl font-bold mt-4">
            Front-End Development
        </h2>

        <!-- Description -->
        <p class="text-gray-600 mt-2">
            Learn HTML, CSS, JavaScript, Bootstrap, Tailwind CSS, and modern web development techniques.
        </p>

        <!-- Button -->
        <button class="bg-blue-500 text-white px-4 py-2 rounded mt-4 hover:bg-blue-600">
            Learn More
        </button>

    </div>

</body>
</html>
