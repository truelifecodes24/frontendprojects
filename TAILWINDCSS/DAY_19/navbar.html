<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Navbar</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="flex justify-between items-center bg-blue-500 text-white p-4">

        <!-- Logo -->
        <div class="text-2xl font-bold">
            MyLogo
        </div>

        <!-- Navigation Links -->
        <div class="flex gap-6">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>

        <!-- Login Button -->
        <button class="bg-white text-blue-500 px-4 py-2 rounded">
            Login
        </button>

    </nav>

</body>
</html>
