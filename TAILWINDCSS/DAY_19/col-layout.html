<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Grid Layout</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-10">

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

        <div class="bg-blue-500 text-white p-10 rounded-lg text-center">
            Box 1
        </div>

        <div class="bg-green-500 text-white p-10 rounded-lg text-center">
            Box 2
        </div>

        <div class="bg-red-500 text-white p-10 rounded-lg text-center">
            Box 3
        </div>

        <div class="bg-yellow-500 text-white p-10 rounded-lg text-center">
            Box 4
        </div>

        <div class="bg-purple-500 text-white p-10 rounded-lg text-center">
            Box 5
        </div>

        <div class="bg-pink-500 text-white p-10 rounded-lg text-center">
            Box 6
        </div>

    </div>

</body>
</html>
