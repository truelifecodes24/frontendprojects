<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">

    <!-- Dashboard Layout -->
    <div class="grid grid-cols-1 md:grid-cols-4 min-h-screen">

        <!-- Sidebar -->
        <aside class="bg-gray-800 text-white p-5">
            <h2 class="text-2xl font-bold mb-6">Admin Panel</h2>

            <nav class="flex flex-col gap-4">
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Dashboard</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Users</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Courses</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Reports</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="md:col-span-3 p-6">

            <h1 class="text-3xl font-bold mb-6">Dashboard</h1>

            <!-- Statistics Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

                <div class="bg-white p-5 rounded-lg shadow">
                    <h3 class="text-gray-500">Users</h3>
                    <p class="text-3xl font-bold">1,250</p>
                </div>

                <div class="bg-white p-5 rounded-lg shadow">
                    <h3 class="text-gray-500">Courses</h3>
                    <p class="text-3xl font-bold">85</p>
                </div>

                <div class="bg-white p-5 rounded-lg shadow">
                    <h3 class="text-gray-500">Reports</h3>
                    <p class="text-3xl font-bold">42</p>
                </div>

                <div class="bg-white p-5 rounded-lg shadow">
                    <h3 class="text-gray-500">Revenue</h3>
                    <p class="text-3xl font-bold">₹50,000</p>
                </div>

            </div>

        
            <div class="bg-white rounded-lg shadow p-5 overflow-x-auto">

                <h2 class="text-xl font-bold mb-4">Recent Users</h2>

                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-200">
                            <th class="p-3 text-left">ID</th>
                            <th class="p-3 text-left">Name</th>
                            <th class="p-3 text-left">Email</th>
                            <th class="p-3 text-left">Role</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr class="border-b">
                            <td class="p-3">1</td>
                            <td class="p-3">John</td>
                            <td class="p-3">john@email.com</td>
                            <td class="p-3">Student</td>
                        </tr>

                        <tr class="border-b">
                            <td class="p-3">2</td>
                            <td class="p-3">Sarah</td>
                            <td class="p-3">sarah@email.com</td>
                            <td class="p-3">Trainer</td>
                        </tr>

                        <tr>
                            <td class="p-3">3</td>
                            <td class="p-3">David</td>
                            <td class="p-3">david@email.com</td>
                            <td class="p-3">Admin</td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </main>

    </div>

</body>
</html>
