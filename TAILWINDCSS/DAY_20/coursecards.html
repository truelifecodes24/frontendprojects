    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Course Cards</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">

    <section class="max-w-7xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-center mb-8">
            Popular Courses
        </h1>

        <!-- Responsive Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

            <!-- Card 1 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <img src="../assets/images/html5.png" alt="Course">
                <div class="p-4">
                    <h2 class="text-xl font-semibold">HTML Course</h2>
                    <p class="text-gray-600">Trainer: John</p>
                    <p class="text-green-600 font-bold mt-2">₹999</p>
                    <button class="mt-3 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Enroll
                    </button>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <img src="../assets/images/css3.png" alt="Course">
                <div class="p-4">
                    <h2 class="text-xl font-semibold">CSS Course</h2>
                    <p class="text-gray-600">Trainer: Sarah</p>
                    <p class="text-green-600 font-bold mt-2">₹1199</p>
                    <button class="mt-3 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Enroll
                    </button>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <img src="../assets/images/js.png" alt="Course">
                <div class="p-4">
                    <h2 class="text-xl font-semibold">JavaScript</h2>
                    <p class="text-gray-600">Trainer: David</p>
                    <p class="text-green-600 font-bold mt-2">₹1499</p>
                    <button class="mt-3 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Enroll
                    </button>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <img src="../assets/images/react.png" alt="Course">
                <div class="p-4">
                    <h2 class="text-xl font-semibold">React JS</h2>
                    <p class="text-gray-600">Trainer: Emma</p>
                    <p class="text-green-600 font-bold mt-2">₹1999</p>
                    <button class="mt-3 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Enroll
                    </button>
                </div>
            </div>

            <!-- Card 5 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <img src="../assets/images/tailwind.png" alt="Course">
                <div class="p-4">
                    <h2 class="text-xl font-semibold">Tailwind CSS</h2>
                    <p class="text-gray-600">Trainer: Alex</p>
                    <p class="text-green-600 font-bold mt-2">₹1299</p>
                    <button class="mt-3 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Enroll
                    </button>
                </div>
            </div>

            <!-- Card 6 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <img src="../assets/images/bs.png" alt="Course">
                <div class="p-4">
                    <h2 class="text-xl font-semibold">Bootstrap</h2>
                    <p class="text-gray-600">Trainer: Mike</p>
                    <p class="text-green-600 font-bold mt-2">₹899</p>
                    <button class="mt-3 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Enroll
                    </button>
                </div>
            </div>

        </div>
    </section>
</body>
</html>
