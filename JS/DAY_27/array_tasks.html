    console.log('Task 6 -Anagram Check');
    const anagram=(word1,word2)=>{
        let count=0
        for(let j=0;j<word1.length;j++){
            for(let k=0;k<word2.length;k++){
                if(word1[j]==word2[k]){
                    count++
                }
            }
        }

            console.log("These words are Anagram","Word1 =",word1,"Word2 =",word2);   
        }

        }
    }

    console.log('Task 7 -Armstrong Number');
    const amstrong=(num)=>{
        let h= Math.floor(num/100)
        let r=num%100
        let t= Math.floor(r/10)
        let o=r%10
        let s=(h**3)+(t**3)+(o**3)
        console.log(s);
        
        if(num==s){
            console.log(num,"is a Amstrong number");    
        }
        else{
            console.log(num,"is not a Amstrong number");  
        }
    }
    amstrong(153)


    console.log('Task 8 -Prime Number');
    const prime=(number)=>{

        for(let p1=2;p1<=Math.floor(number/2);p1++){

                p=false
                break;
            }
        }
        if(p){

        }

        }
    }
