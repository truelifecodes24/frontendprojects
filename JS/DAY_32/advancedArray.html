    console.log('Task 21-Find highest number from:');
    const array = [100,500,800,200]
    const highest =array.reduce((acc,current)=>{
        let high=acc
        if(acc<current){
            high=current
        }
        return high
    },0)
    console.log(`highest number : ${highest}`);

        }
