<script>
// arithmentic operators
    let valueOne = 30
    let valueTwo = 10 
    let addFunction = valueOne + valueTwo
    console.log('addFunction', addFunction);

    let subFunction = valueOne - valueTwo
    console.log('subFunction', subFunction);

    let multiFunction = valueOne * valueTwo
    console.log('multiFunction', multiFunction);

    let divFunction = valueOne / valueTwo
    console.log('divFunction', divFunction);

    // assignment operators
     valueOne +=20
    console.log('valueOne', valueOne);

    valueOne -=20
    console.log('valueOne', valueOne);

    valueOne *=10
    console.log('valueOne', valueOne);

    valueOne /=20
    console.log('valueOne', valueOne);


</script>
